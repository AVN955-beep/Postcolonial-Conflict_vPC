<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Конфликт в Сигнии</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    min-height: 100vh;
    background: linear-gradient(to bottom right, black, darkblue);
    background-attachment: fixed;
    color: black;
    display: flex;
  }

  /* ---- SIDEBAR ---- */
  #ui-bar {
    width: 220px;
    min-width: 220px;
    background-color: white;
    color: black;
    font-family: Arial;
    box-shadow: 0 0 5px 5px black;
    border: 2px solid black;
    border-radius: 2%;
    padding: 15px;
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    overflow-y: auto;
    z-index: 50;
  }

  #ui-bar h2 {
    font-size: 1em;
    margin-bottom: 8px;
    font-weight: bold;
  }

  #ui-bar a {
    display: inline-block;
    margin: 4px 0;
    padding: 4px 6px;
    color: black;
    background-color: #C8C8C8;
    box-shadow: 0 0 3px 3px #C8C8C8;
    text-decoration: none;
    cursor: pointer;
  }

  #ui-bar a:hover {
    color: white;
    background-color: black;
    box-shadow: 0 0 3px 3px black;
  }

  #ui-bar a:active {
    color: red;
    background-color: black;
    box-shadow: 0 0 3px 3px black;
  }

  #ui-bar .sidebar-title {
    font-size: 1.1em;
    font-weight: bold;
    margin-bottom: 6px;
  }

  #ui-bar hr {
    margin: 10px 0;
    border: 1px solid #aaa;
  }

  /* Restart button */
  #restart-btn {
    margin-top: 10px;
    padding: 5px 10px;
    cursor: pointer;
    background-color: #C8C8C8;
    border: 1px solid black;
    font-size: 0.9em;
  }
  #restart-btn:hover { background-color: #333; color: white; }

  /* ---- MAIN CONTENT ---- */
  #story {
    margin-left: 240px;
    padding: 20px;
    flex: 1;
  }

  #passages {
    max-width: 54em;
    margin: 0 auto;
  }

  .passage {
    padding: 30px;
    background-color: white;
    color: black;
    border-radius: 4px;
    box-shadow: 0 0 6px 2px rgba(0,0,0,0.4);
  }

  .passage hr {
    color: black;
    background: gray;
    width: 100%;
    height: 2px;
    border: none;
    margin: 10px 0;
  }

  .passage a {
    padding: 3px;
    color: black;
    background-color: #C8C8C8;
    box-shadow: 0 0 3px 3px black;
    text-decoration: none;
    cursor: pointer;
    display: inline-block;
    margin: 3px 0;
  }

  .passage a:hover {
    color: white;
    background-color: black;
    box-shadow: 0 0 3px 3px black;
    text-decoration: none;
  }

  .passage a:active {
    color: blue;
    background-color: black;
    box-shadow: 0 0 3px 3px black;
  }

  .passage p { margin: 8px 0; }

  .faction-blue { color: blue; font-weight: bold; }
  .faction-red  { color: red;  font-weight: bold; }
  .faction-green{ color: green;font-weight: bold; }

  .draft-section {
    margin: 6px 0;
    padding: 4px 0;
  }
  .draft-section .issue-link {
    font-weight: bold;
    font-size: 1.05em;
  }
  .draft-section .current-choice {
    font-style: italic;
    color: #333;
    font-size: 0.95em;
  }

  .title-big {
    font-size: 2.5em;
    font-weight: bold;
    text-align: center;
    margin: 10px 0;
  }

  .center { text-align: center; }

  .options-list {
    list-style: none;
    margin: 10px 0;
  }
  .options-list li {
    margin: 8px 0;
  }

  .result-section {
    margin: 12px 0;
    padding: 10px;
    border-left: 4px solid #888;
    background: #f9f9f9;
  }

  .satisfaction {
    font-weight: bold;
  }
  .very-satisfied { color: darkgreen; }
  .satisfied { color: green; }
  .dissatisfied { color: orange; }
  .very-dissatisfied { color: red; }

  .consultations-count {
    font-weight: bold;
    color: #333;
    font-size: 1.1em;
  }

  #map-img {
    max-width: 100%;
    border: 1px solid #ccc;
    margin: 10px auto;
    display: block;
  }

  .game-over-notice {
    background: #ffe;
    border: 2px solid red;
    padding: 10px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 10px;
  }

  @media (max-width: 800px) {
    #ui-bar { display: none; }
    #story { margin-left: 0; }
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="ui-bar">
  <div class="sidebar-title">Конфликт в Сигнии</div>
  <hr>
  <div id="sidebar-menu"></div>
  <hr>
  <button id="restart-btn" onclick="restartGame()">↺ Начать заново</button>
</div>

<!-- MAIN CONTENT -->
<div id="story">
  <div id="passages">
    <div class="passage" id="passage-content"></div>
  </div>
</div>

<script>
// ==================== GAME STATE ====================
var state = {};

function initState() {
  state = {
    consult: 0,
    over: 0,
    elmin: 0,
    south: 0,
    dismaj: 0,
    pow: 0,
    fed: 0,
    lang: 0,
    natres: 0,
    prop: 0,
    score: 0
  };
}

// ==================== NAVIGATION ====================
var navHistory = [];

function goTo(passage) {
  navHistory.push(passage);
  renderPassage(passage);
}

function restartGame() {
  initState();
  navHistory = [];
  goTo('Start');
}

// ==================== SATISFACTION LOGIC ====================
function calcSatisfaction() {
  var elmin = 0, dismaj = 0, south = 0;

  // pow
  if (state.pow === 1) { elmin -= 3; dismaj += 3; south -= 1; }
  if (state.pow === 2) { elmin += 1; }
  if (state.pow === 3) { elmin += 4; dismaj -= 4; }

  // fed
  if (state.fed === 1) { elmin -= 1; dismaj -= 2; south += 3; }
  if (state.fed === 2) { south -= 1; }
  if (state.fed === 3) { elmin += 1; dismaj += 1; south -= 4; }

  // natres
  if (state.natres === 1) { elmin -= 1; dismaj += 3; south -= 3; }
  if (state.natres === 2) { elmin += 2; south -= 1; }
  if (state.natres === 3) { elmin -= 1; dismaj -= 2; south += 3; }

  // lang
  if (state.lang === 1) { elmin += 2; dismaj -= 3; }
  if (state.lang === 3) { elmin -= 1; dismaj += 2; }

  // prop
  if (state.prop === 1) { elmin -= 3; dismaj += 3; south -= 1; }
  if (state.prop === 2) { elmin += 1; }
  if (state.prop === 3) { elmin += 2; dismaj -= 3; }

  return { elmin: elmin, dismaj: dismaj, south: south };
}

function satisfactionLabel(val) {
  if (val <= -2) return '<span class="satisfaction very-dissatisfied">Крайне недовольны</span>';
  if (val < 0)   return '<span class="satisfaction dissatisfied">Недовольны</span>';
  if (val < 3)   return '<span class="satisfaction satisfied">Довольны</span>';
  return '<span class="satisfaction very-satisfied">Очень довольны</span>';
}

    case 'Intro2b':
      html = `
        <p>Основные группы:</p>
        <br>
        <p><span class="faction-blue">АТРАТИ</span>: меньшинство, составляющее около 30% населения. Традиционно проживали в прибрежных районах, но имели сильное присутствие и во внутренних областях. При британском правлении <span class="faction-blue">АТРАТИ</span> были, как правило, экономически более благополучны по сравнению с другими группами и чаще проживали в городах и столице.</p>
        <p>После независимости <span class="faction-blue">АТРАТИ</span> (будучи более образованными, лучше владея английским и находясь ближе к центрам власти) непропорционально часто занимали высшие должности в государственной бюрократии и сумели присвоить себе значительную долю ценных сельскохозяйственных земель страны.</p>
        <br>
        <p><span class="faction-red">ОЛОРИЙЦЫ</span>: большинство населения страны — около 55%. Традиционно земледельческий народ (хотя многие за последние годы переехали в города). Значительная часть населения говорит на родном олорийском языке, немалый процент плохо владеет английским. <span class="faction-red">ОЛОРИЙЦЫ</span> в целом были экономически хуже обеспечены, чем <span class="faction-blue">АТРАТИ</span>, до и после независимости.</p>
        <br>
        <p><span class="faction-green">МЕЛАНКОНИЙЦЫ</span>: около 15% населения — совокупность племён, населяющих Меланконию на юге страны. Эти народы в основном говорят по-английски, который вытеснил разнообразные местные языки. Тем не менее они исторически сопротивлялись включению в сигнийское государство, многие выступают за автономию или полную независимость.</p>
        <p>Одна из причин сепаратистских настроений — культурные различия между севером и югом. Другая — значительные запасы нефти под территорией Меланконии, и многие хотят гарантировать, что эти ресурсы останутся под местным контролем.</p>
        <br>
        <a onclick="goTo('Intro3')">Продолжить →</a>

        <p>После обретения независимости правительство национального единства, включавшее как <span class="faction-red">ОЛОРИЙЦЕВ</span>, так и <span class="faction-blue">АТРАТИ</span>, управляло Сигнией несколько лет.</p>
        <br>
        <p>Однако в последние месяцы главная олорийская партия пригрозила выйти из правительства и добиться принятия новой конституции, заявив, что <span class="faction-blue">АТРАТИ</span> используют своё непропорциональное влияние в бюрократии и высших эшелонах армии для маргинализации олорийских требований. Тем временем <span class="faction-green">МЕЛАНКОНИЙЦЫ</span> практически не представлены в законодательном органе, а на юге начало проявляться вооружённое повстанческое движение, добивающееся меланконийской автономии или независимости.</p>

        <a onclick="goTo('begin')">Вернуться к списку вопросов</a>`;
      break;

    case 'proppos':
      html = `
        <p><span class="faction-blue">АТРАТИ</span> выступают за сильную правовую защиту права собственности. Они утверждают, что предоставление правительству права конфисковывать или перераспределять землю и производительные ресурсы подорвёт экономический рост, отпугнёт инвесторов и ухудшит положение всей страны.</p>
        <br>
        <p><span class="faction-red">ОЛОРИЙЦЫ</span> выступают за прямое конституционное закрепление права центрального правительства на перераспределение и земельную реформу. Они считают, что нынешнее распределение богатства отражает несправедливые колониальные порядки, а долгосрочный мир и благополучие страны требуют, чтобы правительство могло непосредственно устранять это неравенство.</p>
        <br>
        <p><span class="faction-green">МЕЛАНКОНИЙЦЫ</span> не хотят, чтобы центральное правительство располагало конституционно гарантированными правами на перераспределение земли, однако не придают особого значения этому конкретному вопросу.</p>
        <br>
        <a onclick="goTo('prop')">Вернуться к вариантам</a>`;
      break;

    case 'lowprop':
      state.prop = 1;
      html = `<p>Вы выбрали систему с широкими полномочиями центрального правительства в области перераспределения и земельной реформы.</p><br><a onclick="goTo('begin')">Вернуться к списку вопросов</a>`;
      break;
    case 'midprop':
      state.prop = 2;
      html = `<p>Вы выбрали умеренную позицию в отношении права собственности и землевладения.</p><br><a onclick="goTo('begin')">Вернуться к списку вопросов</a>`;
      break;
    case 'hiprop':
      state.prop = 3;
      html = `<p>Вы закрепили сильную защиту права собственности и ограничили возможность государства национализировать и перераспределять экономические ресурсы и землю.</p><br><a onclick="goTo('begin')">Вернуться к списку вопросов</a>`;
      break;

    // ---- VOTE (FINAL RESULT) ----
    case 'vote':
      if (state.pow === 0 || state.fed === 0 || state.lang === 0 || state.prop === 0 || state.natres === 0) {
        html = `<p>Вы ещё не рассмотрели все основные вопросы.</p><br><a onclick="goTo('begin')">Вернуться к списку вопросов</a>`;
      } else {
        state.over = 1;
        var s = calcSatisfaction();
        var elmin = s.elmin, dismaj = s.dismaj, south = s.south;
        var atrati = '', olorian = '', melan = '';

        // ATRATI
        if (elmin <= -2) {
          atrati = `<span class="faction-blue">АТРАТИ</span> крайне недовольны итоговым соглашением. Они вынуждены временно принять его, однако ходят упорные слухи, что офицеры-<span class="faction-blue">АТРАТИ</span> в армии и бюрократии готовят государственный переворот против нового правительства. Если набравшее власть большинство предпримет действия, которые <span class="faction-blue">АТРАТИ</span> сочтут ущемляющими их интересы, риск государственного переворота будет высоким.`;
        } else if (elmin < 0) {
          atrati = `<span class="faction-blue">АТРАТИ</span> недовольны конечным соглашением. Они примут его, но будут настороженно следить за тем, как большинство пользуется своими конституционными полномочиями.`;
        } else if (elmin < 3) {
          atrati = `<span class="faction-blue">АТРАТИ</span> довольны итоговым конституционным соглашением. Они принимают его как разумный компромисс.`;
        } else {
          atrati = `<span class="faction-blue">АТРАТИ</span> очень довольны итоговым конституционным соглашением. Они с энтузиазмом поддерживают его как выгодный результат.`;
        }

        // OLORIANS
        if (dismaj <= -2) {
          olorian = `<span class="faction-red">ОЛОРИЙЦЫ</span> крайне недовольны итоговым соглашением. Главная олорийская партия объявляет о выходе из переговоров и отказывается признавать конституцию. Олорийские лидеры призывают к массовым протестам и угрожают вооружённым сопротивлением, если новый конституционный порядок будет введён в действие.`;
        } else if (dismaj < 0) {
          olorian = `<span class="faction-red">ОЛОРИЙЦЫ</span> недовольны итоговым соглашением. Они примут его, однако значительная часть олорийского населения считает конституцию несправедливой. Сохраняется нестабильность, вероятны гражданские беспорядки.`;
        } else if (dismaj < 3) {
          olorian = `<span class="faction-red">ОЛОРИЙЦЫ</span> довольны итоговым конституционным соглашением. Они принимают его как разумный компромисс, позволяющий учесть интересы большинства.`;
        } else {
          olorian = `<span class="faction-red">ОЛОРИЙЦЫ</span> очень довольны итоговым конституционным соглашением и с энтузиазмом поддерживают его принятие.`;
        }

        // MELANCONIANS
        if (south <= -2) {
          melan = `<span class="faction-green">МЕЛАНКОНИЙЦЫ</span> крайне недовольны итоговым соглашением. Повстанческое движение на юге усиливается и превращается в полномасштабную гражданскую войну. Перспективы единой Сигнии выглядят мрачно.`;
        } else if (south < 0) {
          melan = `<span class="faction-green">МЕЛАНКОНИЙЦЫ</span> недовольны итоговым соглашением. Они неохотно принимают его, однако повстанческая активность на юге сохраняется. Сепаратистские тенденции остаются сильными.`;
        } else if (south < 3) {
          melan = `<span class="faction-green">МЕЛАНКОНИЙЦЫ</span> в целом довольны итоговым конституционным соглашением. Насильственная активность на юге значительно снижается.`;
        } else {
          melan = `<span class="faction-green">МЕЛАНКОНИЙЦЫ</span> очень довольны итоговым конституционным соглашением. Сепаратистское движение теряет поддержку, поскольку меланконийское население видит в новом конституционном строе выгодный вариант.`;
        }

        // Overall outcome
        var allOk = elmin >= 0 && dismaj >= 0 && south >= 0;
        var anyVeryBad = elmin <= -2 || dismaj <= -2 || south <= -2;
        var anyBad = elmin < 0 || dismaj < 0 || south < 0;

        var overall = '';
        if (allOk) {
          overall = `<div class="result-section" style="border-color:darkgreen;background:#e8f5e9;"><b>ИТОГ: Успех!</b> Конституционное соглашение принято всеми тремя фракциями. Сигния начинает движение к стабильному демократическому управлению.</div>`;
        } else if (anyVeryBad) {
          overall = `<div class="result-section" style="border-color:darkred;background:#fdecea;"><b>ИТОГ: Провал!</b> Одна или несколько фракций категорически отвергают конституционное соглашение. Политический порядок в Сигнии рушится, страну охватывают насилие и нестабильность.</div>`;
        } else {
          overall = `<div class="result-section" style="border-color:orange;background:#fff8e1;"><b>ИТОГ: Неустойчивый мир.</b> Конституция принята, однако некоторые фракции остались недовольны. Будущее Сигнии остаётся неопределённым.</div>`;
        }

        html = `
          <p>Проект конституционного соглашения вызывает следующую реакцию переговорных сторон:</p>
          <br>
          <div class="result-section"><p>${atrati}</p></div>
          <div class="result-section"><p>${olorian}</p></div>
          <div class="result-section"><p>${melan}</p></div>
          <br>
          ${overall}
          <br>
          <b>Итоговые показатели удовлетворённости:</b>
          <ul style="margin:8px 0 8px 20px;">
            <li><span class="faction-blue">АТРАТИ</span>: ${satisfactionLabel(elmin)} (${elmin > 0 ? '+' : ''}${elmin})</li>
            <li><span class="faction-red">ОЛОРИЙЦЫ</span>: ${satisfactionLabel(dismaj)} (${dismaj > 0 ? '+' : ''}${dismaj})</li>
            <li><span class="faction-green">МЕЛАНКОНИЙЦЫ</span>: ${satisfactionLabel(south)} (${south > 0 ? '+' : ''}${south})</li>
          </ul>
          <br>
          <a onclick="restartGame()">↺ Начать заново</a>`;
      }
      break;

    default:
      html = `<p>Раздел не найден: <b>${name}</b></p><br><a onclick="goTo('begin')">Вернуться к началу</a>`;
  }

  document.getElementById('passage-content').innerHTML = html;
  window.scrollTo(0, 0);
  updateSidebar();
}

// ==================== SIDEBAR ====================
function updateSidebar() {
  var consLeft = Math.max(0, 4 - state.consult);
  var sidebar = `
    <div style="font-size:0.95em;">
      <a onclick="goTo('begin')">Согласовать проект</a><br><br>
      <a onclick="goTo('parties')">Консультация с фракциями</a><br><br>
      <a onclick="goTo('facinfo')">Информация о фракциях</a><br><br>
      <span style="font-size:0.85em;">Осталось консультаций: <b>${consLeft}</b></span><br><br>
      <a onclick="goTo('vote')"><b>Предложить проект конституции</b></a>
    </div>`;
  document.getElementById('sidebar-menu').innerHTML = sidebar;
}

// ==================== INIT ====================
initState();
goTo('Start');

    if(!e.data||e.data.type!=='INLINE_EDIT_CAPTURE_REQUEST')return;
    var scrollX=window.scrollX||window.pageXOffset||0;
    var scrollY=window.scrollY||window.pageYOffset||0;
    var w=window.innerWidth,h=window.innerHeight;
    try{
      var clone=document.documentElement.cloneNode(true);
      var rm=clone.querySelectorAll('script,link[rel="stylesheet"],style');
      for(var i=0;i<rm.length;i++){rm[i].remove();}
      inlineAll(document.documentElement,clone);
      stripExternal(clone);
      var html=new XMLSerializer().serializeToString(clone);
      var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'">'
        +'<foreignObject width="100%" height="100%">'
        +'<div xmlns="http://www.w3.org/1999/xhtml" style="width:'+w+'px;height:'+h+'px;overflow:hidden">'
        +'<div style="transform:translate(-'+scrollX+'px,-'+scrollY+'px);transform-origin:top left">'
        +html+'</div></div></foreignObject></svg>';
      var svgUrl='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
      var img=new Image();
      img.onload=function(){
        var c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0);
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:c.toDataURL('image/png'),scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.onerror=function(){
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.src=svgUrl;
    }catch(err){
      window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
    }
  });
})();
</script></body>
</html>
